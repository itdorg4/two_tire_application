# SonarQube project configuration
# Docs: https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/scanners/sonarscanner/

# Must match the project key created in your SonarQube server
sonar.projectKey=two-tire-application
sonar.projectName=Two Tire Application

# Source code
sonar.sources=app
sonar.sourceEncoding=UTF-8

# Exclude non-source / generated artifacts from analysis
sonar.exclusions=**/templates/**,**/*.db,**/__pycache__/**,seed.py

# Python settings
sonar.python.version=3.12

# Test coverage report (produced by the CI step; ignored if absent)
sonar.python.coverage.reportPaths=coverage.xml
