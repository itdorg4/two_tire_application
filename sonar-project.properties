# SonarQube Cloud (SonarCloud) project configuration
# Docs: https://docs.sonarsource.com/sonarqube-cloud/

# Project key + organization — these are NOT secrets (they're visible in
# the SonarCloud URL). Values confirmed from the project's Information page.
sonar.projectKey=itdorg4_two_tire_application
sonar.organization=itdorg4
sonar.projectName=Two Tire Application

# Source code
sonar.sources=app
sonar.sourceEncoding=UTF-8

# Exclude non-source / generated artifacts from analysis
sonar.exclusions=**/templates/**,**/*.db,**/__pycache__/**,seed.py

# Python settings
sonar.python.version=3.12

# Test coverage report (produced by the CI step; ignored if absent)
sonar.python.coverage.reportPaths=coverage.xml
