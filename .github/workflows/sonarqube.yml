name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Disable shallow clone so SonarQube can assign issues to authors
          # and compute accurate "new code" periods.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pytest

      - name: Run tests with coverage
        continue-on-error: true
        run: |
          if ls app/test_*.py app/tests 2>/dev/null; then
            coverage run -m pytest app
            coverage xml -o coverage.xml
          else
            echo "No tests found, skipping coverage."
          fi

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Fail the pipeline if the project does not pass the Quality Gate.
      # Requires the SonarQube webhook / report-task.txt produced above.
      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ---------------------------------------------------------------------------
  # CI pipeline — runs only after the SonarQube scan + Quality Gate succeed.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install flake8

      - name: Lint with flake8
        working-directory: app
        run: |
          # Stop the build on syntax errors / undefined names.
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat everything else as warnings (non-blocking).
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        working-directory: app
        run: |
          if ls test_*.py tests 2>/dev/null; then
            pytest -q
          else
            echo "No tests found — skipping (add test_*.py files to enable)."
          fi

      - name: Smoke test app import
        working-directory: app
        env:
          SECRET_KEY: ci-test
          ADMIN_USER: admin
          ADMIN_PASSWORD: admin
          # Use SQLite for the import smoke test instead of MySQL.
          MYSQL_HOST: ""
        run: python -c "import app; print('App imported successfully')"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: false
          load: true
          tags: two-tire-application:ci-${{ github.sha }}

      - name: Validate docker-compose config
        run: docker compose config
