name: CI

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Disable shallow clone so SonarQube can assign issues to authors
          # and compute accurate "new code" periods.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pytest

      - name: Run tests with coverage
        continue-on-error: true
        run: |
          if ls app/test_*.py app/tests 2>/dev/null; then
            coverage run -m pytest app
            coverage xml -o coverage.xml
          else
            echo "No tests found, skipping coverage."
          fi

      # Run the scan and upload results to SonarCloud. We intentionally do NOT
      # set -Dsonar.qualitygate.wait, so a failing Quality Gate is visible in
      # SonarCloud but does not fail this CI job. Re-add that flag to enforce
      # the gate as a hard pass/fail.
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SonarQube Cloud (SonarCloud) is always reached at this URL.
          SONAR_HOST_URL: https://sonarcloud.io

  # ---------------------------------------------------------------------------
  # CI pipeline — runs only after the SonarQube scan + Quality Gate succeed.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install flake8

      - name: Lint with flake8
        working-directory: app
        run: |
          # Stop the build on syntax errors / undefined names.
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat everything else as warnings (non-blocking).
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        working-directory: app
        run: |
          if ls test_*.py tests 2>/dev/null; then
            pytest -q
          else
            echo "No tests found — skipping (add test_*.py files to enable)."
          fi

      - name: Smoke test app import
        working-directory: app
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          # Use SQLite for the import smoke test instead of MySQL.
          MYSQL_HOST: ""
        run: python -c "import app; print('App imported successfully')"

  docker-build:
    name: Docker Build & Integration Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    # App + DB credentials for building and running the full two-tier stack.
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_USER: ${{ secrets.ADMIN_USER }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
      MYSQL_USER: ${{ secrets.MYSQL_USER }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: false
          load: true
          tags: two-tire-application:ci-${{ github.sha }}

      - name: Validate docker-compose config
        run: docker compose config

      - name: Start the two-tier stack
        run: docker compose up -d --build

      - name: Wait for the app to become healthy
        run: |
          echo "Waiting for the stack to respond on http://localhost/healthz ..."
          for i in $(seq 1 30); do
            if curl -fsS http://localhost/healthz > /dev/null; then
              echo "App is healthy."
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "App did not become healthy in time. Dumping logs:"
          docker compose logs
          exit 1

      - name: Tear down the stack
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------------------
  # Push the app image to Amazon ECR — only on push to main, after the build
  # and integration test pass. Authenticates via OIDC (no stored AWS keys).
  # ---------------------------------------------------------------------------
  ecr-push:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write      # required for OIDC federation into AWS
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest
