name: CD - Deploy to EC2

# Manual deployment. Pick the ECR image tag to roll out (defaults to latest).
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR image tag to deploy (e.g. latest or a commit SHA)"
        required: true
        default: "latest"

permissions:
  id-token: write   # OIDC: lets the runner resolve the ECR registry
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image reference
        id: img
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          echo "Deploying image: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ inputs.image_tag }}"

      - name: Get ECR login password (on runner via OIDC)
        id: ecrpw
        run: |
          PW=$(aws ecr get-login-password --region "${{ vars.AWS_REGION }}")
          echo "::add-mask::$PW"
          echo "password=$PW" >> "$GITHUB_OUTPUT"

      - name: Copy deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.deploy.yml,it-defined.com.conf"
          target: "~/two_tire_application"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE: ${{ steps.img.outputs.image }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_PASSWORD: ${{ steps.ecrpw.outputs.password }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Forward the env vars above into the remote shell session.
          envs: APP_IMAGE,ECR_REGISTRY,ECR_PASSWORD,SECRET_KEY,ADMIN_USER,ADMIN_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,MYSQL_ROOT_PASSWORD
          script: |
            set -euo pipefail
            cd ~/two_tire_application

            # --- Ensure Docker, Compose plugin and AWS CLI are present (idempotent) ---
            if ! command -v docker >/dev/null 2>&1; then
              echo "Installing Docker..."
              if command -v dnf >/dev/null 2>&1; then sudo dnf install -y docker;
              elif command -v yum >/dev/null 2>&1; then sudo yum install -y docker;
              elif command -v apt-get >/dev/null 2>&1; then sudo apt-get update -y && sudo apt-get install -y docker.io;
              fi
              sudo systemctl enable --now docker
            fi

            if ! sudo docker compose version >/dev/null 2>&1; then
              echo "Installing Docker Compose plugin..."
              if command -v dnf >/dev/null 2>&1; then sudo dnf install -y docker-compose-plugin || true;
              elif command -v apt-get >/dev/null 2>&1; then sudo apt-get install -y docker-compose-plugin || true;
              fi
              # Fallback: install the plugin system-wide so 'sudo docker compose' works.
              if ! sudo docker compose version >/dev/null 2>&1; then
                sudo mkdir -p /usr/local/lib/docker/cli-plugins
                sudo curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
                  -o /usr/local/lib/docker/cli-plugins/docker-compose
                sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              fi
            fi

            # Authenticate to ECR using the short-lived password fetched on the
            # runner (via OIDC) — the EC2 box needs no AWS credentials or CLI.
            # Use sudo for docker so this works before the docker group is active.
            echo "$ECR_PASSWORD" \
              | sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # Write the .env that docker-compose.deploy.yml reads.
            cat > .env <<EOF
            APP_IMAGE=$APP_IMAGE
            SECRET_KEY=$SECRET_KEY
            ADMIN_USER=$ADMIN_USER
            ADMIN_PASSWORD=$ADMIN_PASSWORD
            MYSQL_DATABASE=$MYSQL_DATABASE
            MYSQL_USER=$MYSQL_USER
            MYSQL_PASSWORD=$MYSQL_PASSWORD
            MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
            EOF
            chmod 600 .env

            # Pull the new image and roll out.
            sudo docker compose -f docker-compose.deploy.yml pull
            sudo docker compose -f docker-compose.deploy.yml up -d
            sudo docker image prune -f

            echo "Waiting for the app to become healthy..."
            for i in $(seq 1 20); do
              if curl -fsS http://localhost/healthz > /dev/null; then
                echo "Deployment healthy."
                exit 0
              fi
              echo "Attempt $i/20 — not ready, retrying in 5s..."
              sleep 5
            done
            echo "App did not become healthy. Recent logs:"
            sudo docker compose -f docker-compose.deploy.yml logs --tail=50
            exit 1
