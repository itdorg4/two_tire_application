name: CD - Deploy to EC2

# Manual deployment. Pick the ECR image tag to roll out (defaults to latest).
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR image tag to deploy (e.g. latest or a commit SHA)"
        required: true
        default: "latest"

permissions:
  id-token: write   # OIDC: lets the runner resolve the ECR registry
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image reference
        id: img
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          echo "Deploying image: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ inputs.image_tag }}"

      - name: Copy deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.deploy.yml,it-defined.com.conf"
          target: "~/two_tire_application"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE: ${{ steps.img.outputs.image }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Forward the env vars above into the remote shell session.
          envs: APP_IMAGE,ECR_REGISTRY,AWS_REGION,SECRET_KEY,ADMIN_USER,ADMIN_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,MYSQL_ROOT_PASSWORD
          script: |
            set -euo pipefail
            cd ~/two_tire_application

            # Authenticate to ECR using the instance's IAM role.
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # Write the .env that docker-compose.deploy.yml reads.
            cat > .env <<EOF
            APP_IMAGE=$APP_IMAGE
            SECRET_KEY=$SECRET_KEY
            ADMIN_USER=$ADMIN_USER
            ADMIN_PASSWORD=$ADMIN_PASSWORD
            MYSQL_DATABASE=$MYSQL_DATABASE
            MYSQL_USER=$MYSQL_USER
            MYSQL_PASSWORD=$MYSQL_PASSWORD
            MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
            EOF
            chmod 600 .env

            # Pull the new image and roll out.
            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d
            docker image prune -f

            echo "Waiting for the app to become healthy..."
            for i in $(seq 1 20); do
              if curl -fsS http://localhost/healthz > /dev/null; then
                echo "Deployment healthy."
                exit 0
              fi
              echo "Attempt $i/20 — not ready, retrying in 5s..."
              sleep 5
            done
            echo "App did not become healthy. Recent logs:"
            docker compose -f docker-compose.deploy.yml logs --tail=50
            exit 1
