<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | DevOps Portfolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    .gradient-text { background: linear-gradient(90deg,#0284c7,#7c3aed); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .login-card { max-width: 420px; }
  </style>
</head>
<body>
  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="login-card w-100">
      <div class="text-center mb-4">
        <h3 class="fw-bold gradient-text">Admin Login</h3>
        <p class="text-secondary mb-0">Sign in to edit your profile</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
          <div class="alert alert-{{ category }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <div class="card bg-white text-dark shadow p-4 border-0">
        <form method="POST" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" autofocus required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required />
          </div>
          <button class="btn btn-primary w-100" type="submit"><i class="bi bi-box-arrow-in-right"></i> Login</button>
        </form>
      </div>

      <div class="text-center mt-3">
        <a href="{{ url_for('index') }}" class="text-secondary small">← Back to site</a>
      </div>
    </div>
  </div>
</body>
</html>
